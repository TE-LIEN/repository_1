project:
  packs:
    - pack: Nuvoton::NuMicroM4_DFP@^1.0.1
  setups:
    - setup: Options for Release
      processor:
        fpu: sp
      add-path:
        - ../Src/headers
        - ../../Library/StdDriver/inc
        - ../Src
        - ../../ThirdParty/FreeRTOS/Source
        - ../../ThirdParty/FreeRTOS/Source/include
        - ../../ThirdParty/FreeRTOS/Source/portable/GCC/ARM_CM4F
        - ../../Library/Device/Nuvoton/m460/Include
        - ../../Library/CMSIS/Include
        - ../../Kernel/OSA
        - ../../ThirdParty/lwip/src/include
        - ../../ThirdParty/lwip/ports/include
        - ../../ThirdParty/littleFs
        - ../../Library/UsbHostLib/inc
        - ../Src/FatFs/src
        - ../../ThirdParty/mbedTLS/include
        - ../../ThirdParty/mbedTLS/port
        - ../../ThirdParty/mbedTLS/port/nuvoton
      debug: "on"
      define:
        - SENSMINIA4_NEO
        - RELEASE_VERSION
        - NUVOTON
        - HBI_ENABLE: "1"
        - SUPPORT_USB_HOST
        - TCP_CLIENT_CFG_MBEDTLS_ENABLE
        - HTTPSRV_CFG_MBEDTLS_ENABLE: "1"
        - __MICROLIB
      define-asm:
        - __MICROLIB
      misc:
        - C:
            - -std=c11
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -fno-function-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: sensminiA4Neo.sct
  groups:
    - group: System
      files:
        - file: ../../Library/Device/Nuvoton/m460/Source/system_m460.c
        - file: ../../Library/Device/Nuvoton/m460/Source/ARM/startup_m460.S
