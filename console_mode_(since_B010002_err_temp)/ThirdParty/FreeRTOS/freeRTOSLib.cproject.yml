project:
  packs:
    - pack: Nuvoton::NuMicroM4_DFP@^1.0.1
  setups:
    - setup: Options for FreeRTOS
      processor:
        fpu: sp
      add-path:
        - Source/include
        - Source/portable/GCC/ARM_CM4F
        - Source
      debug: "on"
      output:
        type: lib
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wall
            - -Wextra
            - -Wno-packed
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: freeRTOSLib_FreeRTOS.sct
  groups:
    - group: src
      files:
        - file: Source/event_groups.c
        - file: Source/list.c
        - file: Source/queue.c
        - file: Source/tasks.c
        - file: Source/timers.c
        - file: Source/portable/MemMang/heap_5.c
        - file: Source/portable/GCC/ARM_CM4F/port.c
        - file: Source/FreeRTOSConfig.h
